<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四项内窥镜 - 装备数字展厅</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body data-page="detail" data-equipment-id="sixiang-neikuijing">
    <div class="site-shell">
        <div class="hud-grid"></div>
        <div class="hud-beam beam-a"></div>
        <div class="hud-beam beam-b"></div>

        <header class="topbar">
            <a class="brand" href="../../index.html">
                <img class="brand-logo" src="../../image/图标.png" alt="国家移民管理局标识">
                <span class="brand-text">
                    <strong>装备数字展厅</strong>
                    
                </span>
            </a>
            <nav class="topnav">
                <a href="../../index.html">返回首页</a>
            </nav>
        </header>

        <main class="detail-main">
            <section class="detail-hero">
                <div class="detail-meta">
                    
                    <h1 class="detail-title" id="detail-title"></h1>
                    <h2 class="section-title" id="detail-subtitle"></h2>
                    <p class="detail-summary" id="detail-summary"></p>
                    <div class="detail-chip-row" id="detail-tags"></div>
                    </div>
                <div class="detail-image">
                    <img id="detail-image" src="" alt="">
                    <div class="detail-overlay">
                        <span class="small-label" id="detail-model"></span>
                        <strong id="detail-status"></strong>
                        <small id="detail-image-hint"></small>
                    </div>
                </div>
            </section>

            <section class="detail-grid">
                <div class="panel-stack">
                    <article class="surface-panel">
                        <h2>核心作用</h2>
                        <div class="metric-list" id="detail-metrics"></div>
                    </article>
                    <article class="surface-panel">
                        <h2>装备介绍</h2>
                        <div class="content-columns">
                            <div class="list-block">
                                <h3>功能说明</h3>
                                <ul id="detail-features"></ul>
                            </div>
                            <div class="list-block">
                                <h3>应用场景</h3>
                                <ul id="detail-scenes"></ul>
                            </div>
                        </div>
                        <div class="content-columns">
                            <div class="list-block">
                                <h3>实战价值</h3>
                                <ul id="detail-notes"></ul>
                            </div>
                            <div class="list-block">
                                <h3>图源参考</h3>
                                <ul class="reference-list" id="detail-references"></ul>
                            </div>
                        </div>
                    </article>
                </div>

                                <div class="panel-stack">
                    <article class="surface-panel image-showcase">
                        <h2>图片展示</h2>
                        <div class="showcase-grid">
                            <div class="showcase-frame showcase-primary">
                                <img id="detail-showcase-primary" src="" alt="">
                            </div>
                            <div class="showcase-frame showcase-secondary">
                                <img id="detail-showcase-secondary" src="" alt="">
                            </div>
                        </div>
                        <p class="showcase-caption" id="detail-showcase-caption"></p>
                    </article>
                </div>
            </section>
        </main>
    </div>

    <script src="../../script.js"></script>
</body>
</html>
