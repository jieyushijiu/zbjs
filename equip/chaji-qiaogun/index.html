<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查缉撬棍 - 装备数字展厅</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body data-page="detail" data-equipment-id="chaji-qiaogun">
    <div class="site-shell">
        <div class="hud-grid"></div>
        <div class="hud-beam beam-a"></div>
        <div class="hud-beam beam-b"></div>

        <header class="topbar">
            <a class="brand" href="../../index.html">
                <span class="brand-mark">ZB</span>
                <span class="brand-text">
                    <strong>装备数字展厅</strong>
                    <small>Independent Equipment Page</small>
                </span>
            </a>
            <nav class="topnav">
                <a href="../../index.html">返回首页</a>
            </nav>
        </header>

        <main class="detail-main">
            <section class="detail-hero">
                <div class="detail-meta">
                    <span>Equipment Profile</span>
                    <h1 class="detail-title" id="detail-title"></h1>
                    <h2 class="section-title" id="detail-subtitle"></h2>
                    <p class="detail-summary" id="detail-summary"></p>
                    <div class="detail-chip-row" id="detail-tags"></div>
                    <div class="page-actions">
                        <a class="button button-secondary" href="../../index.html">返回总览</a>
                        <button class="button button-primary" id="copy-link" data-link="">复制二维码链接</button>
                    </div>
                </div>
                <div class="detail-image">
                    <img id="detail-image" src="" alt="">
                    <div class="detail-overlay">
                        <span class="small-label" id="detail-model"></span>
                        <strong id="detail-status"></strong>
                        <small id="detail-image-hint"></small>
                    </div>
                </div>
            </section>

            <section class="detail-grid">
                <div class="panel-stack">
                    <article class="surface-panel">
                        <h2>任务指标</h2>
                        <div class="metric-list" id="detail-metrics"></div>
                    </article>
                    <article class="surface-panel">
                        <h2>装备说明</h2>
                        <div class="content-columns">
                            <div class="list-block">
                                <h3>核心功能</h3>
                                <ul id="detail-features"></ul>
                            </div>
                            <div class="list-block">
                                <h3>应用场景</h3>
                                <ul id="detail-scenes"></ul>
                            </div>
                        </div>
                        <div class="content-columns">
                            <div class="list-block">
                                <h3>作业要点</h3>
                                <ul id="detail-notes"></ul>
                            </div>
                            <div class="list-block">
                                <h3>图源参考</h3>
                                <ul class="reference-list" id="detail-references"></ul>
                            </div>
                        </div>
                    </article>
                </div>

                <div class="panel-stack">
                    <article class="qr-box">
                        <span>QR Landing</span>
                        <h3>二维码建议直接指向当前页面</h3>
                        <p>部署到 Gitee 后，将当前页 URL 直接生成二维码即可，手机扫码会打开这件装备的独立介绍页。</p>
                    </article>
                    <article class="info-card">
                        <h3>页面定位</h3>
                        <p>当前页面是 查缉撬棍 的独立展示入口，后续直接替换图片、参数和现场图即可。</p>
                    </article>
                    <div class="page-nav">
                        <a id="previous-equipment" href="#"></a>
                        <a id="next-equipment" href="#"></a>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="../../script.js"></script>
</body>
</html>
